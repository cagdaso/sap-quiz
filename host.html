<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SAP Live Quiz - Host</title><style>:root{--blue:#0070F2;--blue-dark:#0040B0;--blue-light:#E8F2FD;--blue-mid:#C0DCFA;--text:#32363A;--tl:#6A6D70;--bg:#fff;--bgg:#F5F6F7;--bd:#D9D9D9;--green:#188918;}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:var(--bgg);color:var(--text);min-height:100vh}.hdr{background:var(--blue);color:#fff;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.12)}.hl{display:flex;align-items:center;gap:12px}.badge{background:#fff;color:var(--blue);font-weight:700;font-size:15px;padding:3px 9px;border-radius:4px;letter-spacing:1px}.htitle{font-size:18px;font-weight:600}.hr2{font-size:13px;opacity:.85;display:flex;align-items:center;gap:8px}.dot{width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block;transition:background .3s}.dot.active{background:#2EE62E;box-shadow:0 0 6px #2EE62E}.main{display:grid;grid-template-columns:320px 1fr;gap:24px;padding:28px 32px;max-width:1100px;margin:0 auto}.left{display:flex;flex-direction:column;gap:20px}.card{background:var(--bg);border-radius:12px;box-shadow:0 2px 12px rgba(0,112,242,.1);border:1px solid var(--bd);overflow:hidden}.ch{background:var(--blue-light);border-bottom:2px solid var(--blue-mid);padding:12px 18px;font-weight:700;font-size:12px;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.5px}.cb{padding:18px}.qw{display:flex;flex-direction:column;align-items:center;gap:12px}#qrcode{width:190px;height:190px;border:3px solid var(--blue-mid);border-radius:10px;padding:8px;background:#fff}.qu{font-size:10px;color:var(--blue);word-break:break-all;text-align:center;background:var(--blue-light);padding:5px 8px;border-radius:6px;border:1px solid var(--blue-mid);width:100%}.qh{font-size:11px;color:var(--tl);text-align:center}.ctrls ont-size:13px;font-weight:600;text-align:center;margin-bottom:12px}.sb.waiting{background:#FFF8E1;color:#795502;border:1px solid #FFC300}.sb.active{background:#F1FAF1;color:#0A6B0A;border:1px solid #188918}.sb.ended{background:#FFF0F0;color:#BB0000;border:1px solid #BB0000}.wbox{display:none;background:linear-gradient(135deg,#F1FAF1,#E0F5E0);border:2px solid var(--green);border-radius:10px;padding:16px;text-align:center;margin-bottom:14px}.wbox .big{font-size:56px;font-weight:700;color:var(--green);line-height:1}.wbox .wlbl{font-size:13px;color:#0A6B0A;margin-top:4px;font-weight:600}@keyframes popIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}.wbox.show{display:block;animation:popIn .5s ease}@media(max-width:700px){.main{grid-template-columns:1fr;padding:16px}}</style></head><body><div class="hdr"><div class="hl"><span class="badge">SAP</span><span class="htitle">Live Quiz - Host</span></div><div class="hr2"><span class="dot" id="dot"></span><span id="stxt">Connecting...</span></div></div><div class="main"><div class="left"><div class="card"><div class="ch">QR Code</div><div class="cb"><div class="qw"><div id="qrcode"></div><div class="qu" id="voteUrl">Loading...</div><div class="qh">Participants scan to join</div></div></div></div><div class="card"><div class="ch">Controls</div><div class="cb"><div class="ctrls"><div class="rb" id="roundBadge">Round 0</div><button class="btn bp" id="btnStart" onclick="startRound()" disabled>Start Round</button><button class="btn bd2" id="btnEnd" onclick="endRound()" disabled>End Round</button><button class="btn bsec" id="btnNext" onclick="nextRound()" disabled>Next Round</button></div></div></div><div class="card"><div class="ch">Total Votes</div><div class="cb"><div class="tb"><div class="tn" id="totalVotes">0</div><div class="tl2">votes received</div></div></div></div></div><div><div class="card"><div class="ch">Live Results</div><div class="cb"><div class="sb waiting" id="statusB
