<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>SAP Quiz - Vote</title><style>:root{--blue:#0070F2;--blue-dark:#0040B0;--blue-light:#E8F2FD;--blue-mid:#C0DCFA;--text:#32363A;--tl:#6A6D70;--bg:#fff;--bgg:#F5F6F7;--bd:#D9D9D9;--green:#188918;}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:var(--bgg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}.hdr{background:var(--blue);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px}.badge{background:#fff;color:var(--blue);font-weight:700;font-size:14px;padding:2px 8px;border-radius:4px}.htitle{font-size:16px;font-weight:600}.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;gap:20px;max-width:480px;margin:0 auto;width:100%}.state-card{background:var(--bg);border-radius:16px;box-shadow:0 4px 20px rgba(0,112,242,.12);border:1px solid var(--bd);padding:32px 24px;text-align:center;width:100%}.state-icon{font-size:48px;margin-bottom:12px}.state-title{font-size:20px;font-weight:700;margin-bottom:8px}.state-sub{font-size:14px;color:var(--tl)}.rb{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:20px;padding:6px 16px;font-size:13px;color:var(--blue-dark);font-weight:600;display:inline-block;margin-bottom:16px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}.choice-btn{background:var(--bg);border:2.5px solid var(--blue-mid);border-radius:14px;padding:28px 12px;font-size:32px;font-weight:800;color:var(--blue);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}.choice-btn:hover{background:var(--blue-light);border-color:var(--blue);transform:translateY(-2px)}.choice-btn.selected{background:var(--blue);border-color:var(--blue-dark);color:#fff;transform:scale(1.04)}.choice-btn.unselected{opacity:.4;cursor:default;pointer-events:none}.clabel{font-size:11px;font-weight:600;color:var(--blue-dark)}.voted-card{background:linear-gradient(135deg,#F1FAF1,#E8F5FF);border:2px solid var(--green);border-radius:16px;padding:32px 24px;text-align:center;width:100%}.voted-icon{font-size:52px;margin-bottom:10px}.voted-choice{font-size:64px;font-weight:800;color:var(--blue);line-height:1;margin:8px 0}.voted-title{font-size:18px;font-weight:700;color:var(--green);margin-bottom:6px}.voted-sub{font-size:13px;color:var(--tl)}.ended-card{background:linear-gradient(135deg,#FFF8E1,#E8F2FD);border:2px solid var(--blue-mid);border-radius:16px;padding:32px 24px;text-align:center;width:100%}</style></head><body><div class="hdr"><span class="badge">SAP</span><span class="htitle">Live Quiz</span></div><div class="wrap"><div id="connectingView" class="state-card"><div class="state-icon">&#128257;</div><div class="state-title">Connecting...</div><div class="state-sub">Please wait</div></div><div id="waitingView" class="state-card" style="display:none"><div class="state-icon">&#9200;</div><div class="state-title">Waiting for quiz to start</div><div class="state-sub">The host will start the round shortly</div></div><div id="votingView" style="display:none;width:100%"><div class="rb" id="roundBadge">Round 1</div><div class="choices"><button class="choice-btn" id="btn-A">A<span class="clabel">Option A</span></button><button class="choice-btn" id="btn-B">B<span class="clabel">Option B</span></button><button class="choice-btn" id="btn-C">C<span class="clabel">Option C</span></button><button class="choice-btn" id="btn-D">D<span class="clabel">Option D</span></button></div></div><div id="votedView" style="display:none;width:100%"><div class="voted-card"><div class="voted-icon">&#10003;</div><div class="voted-choice" id="myChoice">A</div><div class="voted-title">Vote received!</div><div class="voted-sub">Waiting for host to end the round</div></div></div><div id="endedView" style="display:none;width:100%"><div class="ended-card"><div class="state-icon">&#127942;</div><div class="state-title">Round ended!</div><div class="state-sub" id="endedSub">Thanks for voting.</div></div></div></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var db,sr,mv=null,hv=false,cr=0;
function show(id){["connectingView","waitingView","votingView","votedView","endedView"].forEach(function(v){document.getElementById(v).style.display=(v===id?"block":"none");});}
function vote(choice){if(hv||!sr)return;hv=true;mv=choice;document.getElementById("myChoice").textContent=choice;lockBtns(choice);sr.child("votes").child(choice).transaction(function(n){return (n||0)+1;});setTimeout(function(){show("votedView");},400);}
function resetBtns(){["A","B","C","D"].forEach(function(c){var b=document.getElementById("btn-"+c);b.className="choice-btn";b.disabled=false;b.onclick=(function(cc){return function(){vote(cc);};})(c);});}
function lockBtns(ch){["A","B","C","D"].forEach(function(c){var b=document.getElementById("btn-"+c);b.onclick=null;b.disabled=true;b.className="choice-btn "+(c===ch?"selected":"unselected");});}
function initVote(){var app=firebase.initializeApp({apiKey:"AIzaSyAvirFSSGzE1BIsDrFFDs3c0Y9iMn7yABw",databaseURL:"https://simplepollbyxpr-default-rtdb.europe-west1.firebasedatabase.app"});db=firebase.database(app);sr=db.ref("quiz");["A","B","C","D"].forEach(function(c){document.getElementById("btn-"+c).onclick=(function(cc){return function(){vote(cc);};})(c);});sr.on("value",function(snap){var s=snap.val()||{status:"waiting",round:0};var st=s.status||"waiting",r=s.round||0;if(st==="waiting"){if(r!==cr){hv=false;mv=null;}show("waitingView");}else if(st==="active"){document.getElementById("roundBadge").textContent="Round "+r;if(r!==cr){hv=false;mv=null;cr=r;resetBtns();}if(hv){show("votedView");}else{resetBtns();show("votingView");}}else if(st==="ended"){document.getElementById("endedSub").textContent=mv?"You voted: "+mv+". Thanks!":"You did not vote this round.";show("endedView");}});}
window.onload=initVote;
</script></body></html>
